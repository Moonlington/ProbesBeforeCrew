// Mallow's PBC patches for MPE
// Requires the Kopernicus mod to work, otherwise no changes will be made
// Based on the science values in PBC and Vexxel's values in the OPM patch.
// Used the nearest large major body to set science multipliers, Soden got a slightly higher mult due to it's wackiness.

@Kopernicus:AFTER[MPE]:NEEDS[MPE]
{
	@Body[Edas]
	{
		@Properties
		{
			@ScienceValues
			{
				%landedDataValue = 4
				%splashedDataValue = 4
				%flyingLowDataValue = 3
				%flyingHighDataValue = 3
				%inSpaceLowDataValue = 3
				%inSpaceHighDataValue = 3
			}
		}
