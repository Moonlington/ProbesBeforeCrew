// Zee's Probes Before Crew Far Future Technologies Patch
// Version 3.3.1
// Unlike other patches included so far, this is not an exhaustive support config; due to FFT's far-endgame nature and propensity for torch drives, we cannot guarantee complete balance while using it.
// However, due to its general popularity, we've added a mini-patch which puts its experiment definitions and certain ISRU parts in line with the rest of PBC, in case you want to use it in career anyway.



//// ***************** Experiment Definitions


@EXPERIMENT_DEFINITION:HAS[#id[fftParticleDetector]]:AFTER[FarFutureTechnologies]:NEEDS[CommunityTechTree]
{
	@baseValue = 18
	@scienceCap = 18
}



//// ***************** ISRU


@PART[fft-scanner-gas-1]:AFTER[FarFutureTechnologies]:NEEDS[CommunityTechTree] // Deuterium Spectrometer
{
	@TechRequired = advScienceTech
	// @entryCost = 21600
	// @cost = 7550
}

@PART[fft-scanner-antimatter-1]:AFTER[FarFutureTechnologies]:NEEDS[CommunityTechTree] // Antimatter Scanner
{
	@TechRequired = experimentalScience
	// @entryCost = 21600
	// @cost = 15550
  @MODULE[ModuleScienceExperiment]:HAS[#experimentID[fftParticleDetector]]
	{
		@xmitDataScalar = 1.0
	}
}

@PART[fft-regolith-scoop-2]:AFTER[FarFutureTechnologies]:NEEDS[CommunityTechTree] // PK-DUST-S
{
	@TechRequired = experimentalScience
	@entryCost = 112000 // pretty sure Nertea put an extra zero here by accident so this fixes it
	@cost = 29000
}

@PART[fft-regolith-scoop-1]:AFTER[FarFutureTechnologies]:NEEDS[CommunityTechTree] // PK-DUST
{
	@TechRequired = advOffworldMining
	@entryCost = 250000
	@cost = 56000
}
