// Zee's Probes Before Crew RemoteTech Patch
// Version 3.0.0

/////////// Vanilla Swap

@PART[HighGainAntenna]:AFTER[RemoteTech]:NEEDS[CommunityTechTree] // HG-55   10bil
{
	@MODULE[ModuleRTAntenna] 
	{
		@Mode1DishRange = 10000000000
		@EnergyCost = 1.1
		@DishAngle = 0.25
	}
}

@PART[RelayAntenna50]:AFTER[RemoteTech]:NEEDS[CommunityTechTree] // RA-15   25bil
{
	@MODULE[ModuleRTAntenna] 
	{
		@Mode1DishRange = 25000000000
		@EnergyCost = 1.04
		@DishAngle = 0.12
	}
}


/////////// Vanilla shift when RT present, 1 node earlier

@PART[commDish]:AFTER[RemoteTech]:NEEDS[CommunityTechTree] // Comm 88-88   40bil with RT (100bil without)
{
	@TechRequired = specializedElectrics
}


/////////// RemoteTech

@PART[RTShortAntenna1]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // DP-10  500k
{
	@TechRequired = start
	@entryCost = 200
	@cost = 120
}

@PART[RTLongAntenna2]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // Comm 32   5 mil
{
	@TechRequired = largeElectrics
	@entryCost = 12000
	@cost = 1500
}

@PART[RTLongAntenna3]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // EXP-VR-2T  3 mil
{
	@TechRequired = electrics
	@entryCost = 3400
	@cost = 550
}

@PART[RTShortDish2]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // KR-7   90 mil
{
	@TechRequired = electrics
	@entryCost = 3800
	@cost = 800
}

@PART[RTLongDish2]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // KR-14  60 Bil
{
	@TechRequired = experimentalElectrics
	@entryCost = 42500
	@cost = 4500
}

@PART[RelayAntenna100]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // RA-100  100 Bil
{
	@MODULE[ModuleRTAntenna]
	{
		@Mode1DishRange = 100000000000    //RT defaults to 250bil
	}
}

@PART[RTGigaDish2]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // CommTech-1   250 Bil
{
	@TechRequired = highPowerElectricalSystems
	@entryCost = 76500
	@cost = 9500
	
	@MODULE[ModuleRTAntenna]
	{
		@Mode1DishRange = 250000000000    //RT defaults to 350bil
	}
}

@PART[RTGigaDish1]:AFTER[RemoteTech]:NEEDS[CommunityTechTree]  // GX-128   400 Bil
{
	@TechRequired = experimentalElectricalSystems
	@entryCost = 97500
	@cost = 13000
}