/////////// ********************* Patch Eeloo contracts to match new position as a moon of Sarnus


@CONTRACT_TYPE[ProbeEeloo]:NEEDS[ProbesBeforeCrew,OPM]
{
	@sortKey = 041
	@REQUIREMENT:HAS[#name[r1]]
	{
		@title = Complete At Least 2 Landing Missions in the Jool System
		@expression = JoonsLanded > 1
	}
}
@CONTRACT_TYPE[CrewEeloo]:NEEDS[ProbesBeforeCrew,OPM]
{
	@sortKey = 042
	@REQUIREMENT:HAS[#name[r1]]
	{
		@title = Complete At Least 2 Landing Missions in the Jool System
		@expression = JoonsLanded > 1
	}
}


