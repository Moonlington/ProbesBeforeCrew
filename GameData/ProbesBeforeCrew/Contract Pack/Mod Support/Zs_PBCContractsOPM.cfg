/////////// ********************* Patch Eeloo contracts to match new position as a moon of Sarnus


@CONTRACT_TYPE[ProbeEeloo]:NEEDS[OPM]
{
	@sortKey = 041
	@REQUIREMENT:HAS[#name[r1]]
	{
		@title = Perform a Flyby Mission to Sarnus
		@expression = SarnusVisit == 1
	}
}
@CONTRACT_TYPE[CrewEeloo]:NEEDS[OPM]
{
	@sortKey = 042
	@REQUIREMENT:HAS[#name[r1]]
	{
		@title = Perform a Flyby Mission to Sarnus
		@expression = SarnusVisit == 1
	}
}


/////////// ********************* LAYER 5 - Outer Planets


//// Probe Sarnus Exploration ********


CONTRACT_TYPE:NEEDS[OPM]
{
	name = ProbeSarnus
	genericTitle = Locked achievement at Sarnus.
	genericDescription = There are still things to accomplish before this!
	title = Explore Sarnus (Probe)
	group = PBCgroup
	description = We're turning this whole Space Exploration thing into clockwork. This mission to Sarnus should be a walk in the park.
	sortKey = 035
	synopsis = Reach Sarnus, dive deep into the lower atmosphere, and return the Probe home safely.
	completedMessage = Just as expected! Everything went off without a hitch.
	agent = KARA
	minExpiry = 0
	maxExpiry = 0
	cancellable = false
	declinable = false
	autoAccept = false
	prestige = Significant
	maxCompletions = 1
	maxSimultaneous = 1
	
	targetBody = Sarnus

	rewardScience = 0.0
	rewardReputation = 0.0
	rewardFunds = 0.0
	failureReputation = 42.0
	failureFunds = 300000.0
	advanceFunds = 0.0
	
	//?x multiplier
	
	PARAMETER
	{
		name = p1
		type = VesselIsType
		vesselType = Probe
	}
	PARAMETER
	{
		name = p2
		type = HasCrewCapacity
		maxCapacity = 0
	}
	PARAMETER
	{
		name = flybyPSarnus
		type = ReachState
		title = Fly By Sarnus
		situation = ESCAPING
		rewardScience = 3.0
		rewardReputation = 10.0
		rewardFunds = 150000.0
		disableOnStateChange = true
		completedMessage = Your Probe has successfully entered the Sphere of Influence governed by Sarnus. 
		completeInSequence = true
	}
	PARAMETER
	{
		name = landPSarnus
		type = ReachState
		title = Dive into Sarnus's Atmosphere
		maxAltitude = 145000
		rewardScience = 5.0
		rewardReputation = 15.0
		rewardFunds = 200000.0
		disableOnStateChange = true
		completedMessage = Successful dive. Your Probe has managed to survive a low atmosphere flight on Sarnus.
		completeInSequence = true
	}
	PARAMETER
	{
		name = vpg
		type = VesselParameterGroup
		title = Return Home
		rewardScience = 4.0
		rewardReputation = 12.0
		rewardFunds = 300000.0
		completeInSequence = true
		
		PARAMETER
		{
			name = land
			type = ReachState
			title = Entered into Sarnus's Atmosphere
			maxAltitude = 145000
			disableOnStateChange = true
			completeInSequence = true
		}
		PARAMETER
		{
			name = return
			type = ReachState
			title = Returned
			targetBody = HomeWorld()
			situation = LANDED
			situation = SPLASHED
			completeInSequence = true
		}
	}
	BEHAVIOUR
	{
		name = SarnusVisit
		type = Expression
		PARAMETER_COMPLETED
		{
			parameter = flybyPSarnus
			SarnusVisit = 1
		}
	}
	REQUIREMENT
	{
		name = r1
		type = Expression
		title = Complete At Least 2 Landing Missions on the Moons of Jool
		expression = JoonsLanded > 1
	}
	REQUIREMENT
	{
		name = bugfix
		type = CompleteContract
		contractType = ProbeSarnus
		invertRequirement = true
	}
}


