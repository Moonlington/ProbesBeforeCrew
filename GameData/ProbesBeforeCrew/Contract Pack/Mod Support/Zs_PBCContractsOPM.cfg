/////////// ********************* Jool parameter to unlock OPM contracts


@CONTRACT_TYPE[ProbeJool]:NEEDS[ProbesBeforeCrew,OPM]
{
	BEHAVIOUR
	{
		name = JoonsLanded
		type = Expression
		PARAMETER_COMPLETED
		{
			parameter = landPJ
			JoonsLanded = $JoonsLanded + 1
		}
	}
}
@CONTRACT_TYPE[CrewJool]:NEEDS[ProbesBeforeCrew,OPM]
{
	BEHAVIOUR
	{
		name = JoonsLanded
		type = Expression
		PARAMETER_COMPLETED
		{
			parameter = landCJ
			JoonsLanded = $JoonsLanded + 1
		}
	}
}
